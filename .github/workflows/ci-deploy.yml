name: CI/CD - Strapi ECS Fargate

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: zayn-strapi
  ECS_CLUSTER: z-strapi-cluster
  ECS_SERVICE: z-strapi-service
  TASK_FAMILY: z-strapi-task
  CONTAINER_NAME: z-strapi-container

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REPOSITORY:$IMAGE_TAG ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG
          docker push ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG
        env:
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}

      - name: Register new task definition revision
        run: |
          IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"

          TASK_DEF=$(jq -n \
            --arg family "${{ env.TASK_FAMILY }}" \
            --arg executionRoleArn "${{ secrets.ECS_EXECUTION_ROLE_ARN }}" \
            --arg containerName "${{ env.CONTAINER_NAME }}" \
            --arg image "$IMAGE" \
            '{
              family: $family,
              networkMode: "awsvpc",
              requiresCompatibilities: ["FARGATE"],
              cpu: "512",
              memory: "1024",
              executionRoleArn: $executionRoleArn,
              containerDefinitions: [
                {
                  name: $containerName,
                  image: $image,
                  essential: true,
                  portMappings: [
                    {
                      containerPort: 1337,
                      protocol: "tcp"
                    }
                  ],
                  logConfiguration: {
                    logDriver: "awslogs",
                    options: {
                      "awslogs-group": "/ecs/strapi",
                      "awslogs-region": "${{ env.AWS_REGION }}",
                      "awslogs-stream-prefix": "ecs"
                    }
                  }
                }
              ]
            }')

          echo "$TASK_DEF" > task-def.json

          aws ecs register-task-definition \
            --cli-input-json file://task-def.json

      - name: Update ECS service to use new task definition
        run: |
          NEW_REVISION=$(aws ecs describe-task-definition \
            --task-definition ${{ env.TASK_FAMILY }} \
            --query 'taskDefinition.revision' \
            --output text)

          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --task-definition ${{ env.TASK_FAMILY }}:$NEW_REVISION
